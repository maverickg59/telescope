<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Telescope</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing {
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    p {
      color: #888;
      margin-bottom: 2rem;
    }

    .tools {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
    }

    .tools a {
      display: block;
      padding: 1.5rem 2.5rem;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1.1rem;
      transition: border-color 0.15s;
    }

    .tools a:hover {
      border-color: #5a5a8a;
    }

    .tools .sub {
      display: block;
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.3rem;
    }
  </style>
</head>

<body>
  <div class="landing">
    <h1>🔭 Telescope</h1>
    <p>Local diagram viewer with hot reloading</p>
    <div class="tools">
      <a href="/mermaid">
        Mermaid
        <span class="sub">Flowcharts, sequences, state diagrams</span>
      </a>
      <a href="/dbml">
        DBML
        <span class="sub">Entity relationship diagrams</span>
      </a>
    </div>
  </div>
</body>

</html>
