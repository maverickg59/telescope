<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <title>Mermaid Viewer</title>
  <link rel="stylesheet" href="/static/mermaid.css">
</head>

<body>
  <nav>
    <span class="nav-title">🔭 Telescope</span>
    <div class="nav-tabs">
      <a href="/mermaid" class="nav-tab active">Mermaid</a>
      <a href="/dbml" class="nav-tab">DBML</a>
    </div>
    <div class="nav-controls">
      <label for="project-select">Project</label>
      <select id="project-select"></select>
      <label for="diagram-select">Diagram</label>
      <select id="diagram-select"></select>
    </div>
  </nav>
  <div id="diagram-container">
    <p class="empty">Loading...</p>
  </div>
  <div class="controls">
    <button id="zoom-in" title="Zoom in"><svg width="14" height="14" viewBox="0 0 14 14">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg></button>
    <button id="zoom-out" title="Zoom out"><svg width="14" height="14" viewBox="0 0 14 14">
        <path d="M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg></button>
    <button id="zoom-fit" title="Fit view"><svg width="14" height="14" viewBox="0 0 14 14">
        <path d="M1 4V1h3M10 1h3v3M13 10v3h-3M4 13H1v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round" fill="none" />
      </svg></button>
    <button id="zoom-lock" title="Lock panning"><svg width="14" height="14" viewBox="0 0 14 14">
        <rect x="2" y="6" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none" />
        <path d="M4.5 6V4.5a2.5 2.5 0 015 0V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          fill="none" />
      </svg></button>
  </div>

  <script type="module" src="/static/mermaid.js"></script>
</body>

</html>
